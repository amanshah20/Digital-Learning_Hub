<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Teacher Dashboard</title>
<link rel="stylesheet" href="teacher.css"/>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <h2 class="logo">Teacher Panel</h2>
    <p id="teacher-info" class="teacher-info"></p>

    <ul class="menu">
        <li data-page="dashboard">📊 Dashboard Overview</li>
        <li data-page="students">👥 Students List</li>
        <li data-page="attendance">✔ Attendance</li>
        <li data-page="qr-attendance">🔳 QR Attendance</li>
        <li data-page="assignments">📁 Assignments</li>
        <li data-page="live-class">🎥 Live Class</li>
        <li data-page="messages">💬 Message Student</li>
        <li data-page="notifications">🔔 Notifications</li>
        <li data-page="info">🗂 Saved Data</li>
    </ul>
</aside>

<!-- MAIN CONTENT -->
<main class="content">

    <!-- SEARCH BAR -->
    <header class="topbar">
        <input type="text" id="search-input" placeholder="Search student by ID or Name..." />
    </header>

    <!-- Dynamic Page Content -->
    <section id="page-content"></section>

</main>

<script src="teacher.js"></script>
</body>
</html>
