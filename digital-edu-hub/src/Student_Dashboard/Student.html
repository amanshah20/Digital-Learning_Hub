<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Student Dashboard — Glass</title>
  <link rel="stylesheet" href="Student.css"/>
</head>
<body>
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="profile glass">
        <div class="avatar" id="avatar">A</div>
        <div class="meta">
          <div id="student-name" class="name">Student Name</div>
          <div id="student-id" class="id">ID: 00000000</div>
        </div>
      </div>

      <nav class="nav glass">
        <ul>
          <li data-page="overview" class="active">Overview</li>
          <li data-page="attendance">Attendance</li>
          <li data-page="assignments">Assignments</li>
          <li data-page="live">Live Classes</li>
          <li data-page="messages">Messages</li>
          <li data-page="courses">Online Courses</li>
          <li data-page="settings">Settings</li>
        </ul>
      </nav>

      <div class="notify glass" id="notify-mini">
        <button id="notifBtn" title="Notifications">🔔</button>
        <span id="notif-count" class="badge" style="display:none">0</span>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <header class="top glass">
        <input id="search" placeholder="Search assignments, classes..." />
        <div class="top-actions">
          <button id="refreshBtn">Refresh</button>
        </div>
      </header>

      <section id="page" class="page">
        <!-- content injected here -->
      </section>
    </main>
  </div>

  <script src="Student.js"></script>
</body>
</html>
